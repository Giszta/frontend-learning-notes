<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Ćwiczenie 3.5</title>
    <style>
      .card {
        max-width: 400px;
        padding: 16px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-family: Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <h1>Karta użytkownika</h1>
    <div id="card-root"></div>

    <script>
      async function renderUserCard() {
        const response = await fetch(
          "https://jsonplaceholder.typicode.com/users/3",
        );
        const user = await response.json();

        const root = document.querySelector("#card-root");

        root.innerHTML = `
          <div class="card">
            <h2>${user.name}</h2>
            <p><strong>Username:</strong> ${user.username}</p>
            <p><strong>Email:</strong> ${user.email}</p>
            <p><strong>Miasto:</strong> ${user.address.city}</p>
            <p><strong>Firma:</strong> ${user.company.name}</p>
          </div>
        `;
      }

      renderUserCard();
    </script>
  </body>
</html>
