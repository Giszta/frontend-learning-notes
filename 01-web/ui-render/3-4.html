<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ćwiczenie 3.4</title>
  </head>
  <body>
    <h1>Ładowanie albumów</h1>
  </body>
  <button id="load-albums">Pokaż albumy</button>
  <div id="albums"></div>

  <script>
    const button = document.querySelector("#load-albums");
    const albumsContainer = document.querySelector("#albums");

    button.addEventListener("click", async () => {
      const response = await fetch(
        "https://jsonplaceholder.typicode.com/albums",
      );
      const albums = await response.json();

      albumsContainer.innerHTML = albums
        .slice(0, 10)
        .map((album) => `<p>${album.id}. ${album.title}</p>`)
        .join("");
    });
  </script>
</html>
