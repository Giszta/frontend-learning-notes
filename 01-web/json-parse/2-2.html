<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ćwiczenie 2.2</title>
  </head>
  <body>
    <h1>Parsowanie tablicy JSON</h1>
    <script>
      async function parsePosts() {
        const response = await fetch(
          "https://jsonplaceholder.typicode.com/posts",
        );
        const posts = await response.json();

        console.log("Czy to tablica?", Array.isArray(posts));
        console.log("Liczba postów:", posts.length);
        console.log("Pierwszy post", posts[0]);
      }
      parsePosts();
    </script>
  </body>
</html>
