<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transformacja danych z JSON</title>
  </head>
  <body>
    <h1>Transformacja danych z JSON</h1>

    <script>
      async function transformUsers() {
        const response = await fetch(
          "https://jsonplaceholder.typicode.com/users",
        );
        const users = await response.json();

        const simplifiedUsers = users.map((user) => {
          return {
            id: user.id,
            displayName: user.name,
            contact: user.email,
          };
        });

        console.log("Oryginalne dane:", users);
        console.log("Uproszczone dane:", simplifiedUsers);
      }
      transformUsers();
    </script>
  </body>
</html>
