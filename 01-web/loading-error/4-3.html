<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ćwiczenie 4.3</title>
  </head>
  <body>
    <h1>Obsługa response.ok</h1>
    <div id="app"></div>

    <script>
      async function loadPost() {
        const app = document.querySelector("#app");
        app.textContent = "Ładowanie...";

        try {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/posts/999999",
          );

          if (!response.ok) {
            throw new Error(`HTTP error: ${response.status}`);
          }
          const post = await response.json();
          app.textContent = post.title;
        } catch (error) {
          app.textContent = "Nie udało się pobrać posta.";
          console.error(error);
        }
      }

      loadPost();
    </script>
  </body>
</html>
