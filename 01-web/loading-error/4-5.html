<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ćwiczenie 4.5</title>
  </head>
  <body>
    <h1>Puste dane vs błąd</h1>
    <div id="app"></div>

    <script>
      async function loadComments() {
        const app = document.querySelector("#app");
        app.textContent = "Ładowanie...";

        try {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/comments?postId=999999",
          );

          if (!response.ok) {
            throw new Error("Błąd HTTP");
          }

          const comments = await response.json();

          if (comments.length === 0) {
            app.textContent = "Brak komentarzy do wyświetlenia.";
            return;
          }

          app.innerHTML = comments
            .map((comment) => `<p>${comment.name}</p>`)
            .join("");
        } catch (error) {
          app.textContent = "Wystąpił błąd podczas pobierania komentarzy.";
          console.error(error);
        }
      }
      loadComments();
    </script>
  </body>
</html>
