<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ćwiczenie 4.2</title>
  </head>
  <body>
    <h1>Error state</h1>
    <div id="app"></div>

    <script>
      async function loadBrokenData() {
        const app = document.querySelector("#app");
        app.textContent = "Ładowanie...";

        try {
          const response = await fetch("https://wrong-url.typicode.com/test");
          const data = await response.json();

          app.textContent = JSON.stringify(data);
        } catch (error) {
          app.textContent = "Wystąpił błąd podczas pobierania danych.";
          console.error("Błąd:", error);
        }
      }

      loadBrokenData();
    </script>
  </body>
</html>
