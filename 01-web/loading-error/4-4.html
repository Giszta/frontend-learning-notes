<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ćwiczenie 4.4</title>
  </head>
  <body>
    <h1>Stany UI</h1>
    <button id="load-btn">Pobierz dane</button>
    <div id="status"></div>

    <script>
      const button = document.querySelector("#load-btn");
      const statusBox = document.querySelector("#status");

      button.addEventListener("click", async () => {
        statusBox.textContent = "Ładowanie...";

        try {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/users/1",
          );

          if (!response.ok) {
            throw new Error("Niepoprawna odpowiedź serwera");
          }
          const user = await response.json();
          statusBox.textContent = `Sukces: ${user.name}`;
        } catch (error) {
          statusBox.textContent = "Błąd pobierania danych.";
          console.error(error);
        }
      });
    </script>
  </body>
</html>
