<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Ćwiczenie 7.5</title>
  </head>
  <body>
    <button id="save-all">Zapisz wszystko</button>
    <pre id="result"></pre>

    <script>
      const button = document.querySelector("#save-all");
      const result = document.querySelector("#result");

      button.addEventListener("click", () => {
        localStorage.setItem("theme", "dark");
        sessionStorage.setItem("wizardStep", "3");
        document.cookie = "currency=PLN; path=/";

        const localValue = localStorage.getItem("theme");
        const sessionValue = sessionStorage.getItem("wizardStep");
        const cookieValue = document.cookie;

        result.textContent = `
localStorage theme: ${localValue}
sessionStorage wizardStep: ${sessionValue}
cookies: ${cookieValue}
        `;
      });
    </script>
  </body>
</html>
