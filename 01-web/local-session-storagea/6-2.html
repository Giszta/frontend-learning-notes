<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ćwiczenie 7.2</title>
  </head>
  <body>
    <div id="output"></div>
    <script>
      localStorage.setItem("username", "Giszta");
      const output = document.querySelector("#output");
      const username = localStorage.getItem("username");
      output.textContent = `Użytkownik z localStorage: ${username}`;
    </script>
  </body>
</html>
