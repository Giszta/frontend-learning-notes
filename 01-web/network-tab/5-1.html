<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Ćwiczenie 5.1</title>

  <body>
    <h1>Network — GET</h1>

    <script>
      async function loadUsers() {
        const response = await fetch(
          "https://jsonplaceholder.typicode.com/users",
        );
        const users = await response.json();
        console.log(users);
      }

      loadUsers();
    </script>
  </body>
