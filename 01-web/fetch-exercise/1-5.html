<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ćwiczenie 1.5</title>
  </head>
  <body>
    <h1>Szukaj użytkownika po ID</h1>

    <form id="user-form">
      <label for="user-id">Podaj ID użytkownika:</label>
      <input
        id="user-id"
        type="number"
        placeholder="Wprowadź ID użytkownika"
        min="1"
        max="10"
      />
      <button type="submit">Pobierz</button>
    </form>

    <script>
      const form = document.getElementById("user-form");
      const input = document.getElementById("user-id");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const userId = input.value;

        const response = await fetch(
          `https://jsonplaceholder.typicode.com/users/${userId}`,
        );
        const user = await response.json();

        console.log(`Pobrany użytkownik o ID ${userId}:`, user);
      });
    </script>
  </body>
</html>
